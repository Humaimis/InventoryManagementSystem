<body>
    <h2>Stock Management</h2>

    <form action="https://httpbin.org/get" method="get">
        <h3>Stock In</h3>
        <label>
            Product:  
            <input type="text" name="stockin_product" />
        </label>
        <br /><br />

        <label>
            Quantity:  
            <input type="number" name="stockin_quantity" />
        </label>
        <br /><br />

        <input type="submit" value="Add Stock" />
    </form>

    <hr />

    <form action="https://httpbin.org/get" method="get">
        <h3>Stock Out</h3>
        <label>
            Product:  
            <input type="text" name="stockout_product" />
        </label>
        <br /><br />

        <label>
            Quantity:  
            <input type="number" name="stockout_quantity" />
        </label>
        <br /><br />

        <input type="submit" value="Remove Stock" />
    </form>
</body>
