  <h1>Add New Product</h1>
  <p style="color: green;">Please fill in the details below to add a new product.</p> <!-- Inline CSS example -->

  <form action="https://example.com/addproduct" method="post">
    <p>
      <label for="pname">Product Name:</label>
      <input type="text" id="pname" name="productname" />
    </p>

    <p>
      <label for="category">Category:</label>
      <select id="category" name="productcategory">
        <option>Electronics</option>
        <option>Furniture</option>
        <option>Clothing</option>
        <option>Food</option>
      </select>
    </p>

    <p>
      <label for="price">Price:</label>
      <input type="number" id="price" name="productprice" step="0.01" />
    </p>

    <p>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" name="productquantity" />
    </p>

    <p>
      <label>Available:</label>
      <input type="radio" name="available" value="Yes" /> Yes
      <input type="radio" name="available" value="No" /> No
    </p>

    <p>
      <label for="features">Features:</label>
      <input type="checkbox" name="features" value="Warranty" /> Warranty
      <input type="checkbox" name="features" value="Discount" /> Discount
      <input type="checkbox" name="features" value="Free Shipping" /> Free Shipping
    </p>

    <p>
      <label for="description">Description:</label>
      <textarea id="description" name="productdescription" rows="4" cols="40"></textarea>
    </p>

    <p>
      <input type="submit" value="Add Product" />
      <input type="reset" value="Clear Form" />
    </p>
  </form>
