  <h1>Contact Us</h1>
  <p>If you have any questions or feedback, please fill out the form below.</p>

  <!-- Contact Form -->
  <form action="https://httpbin.org/get" method="get">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="username" required><br><br>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="useremail" required><br><br>

    <label for="subject">Subject:</label>
    <input type="text" id="subject" name="subject"><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="usermessage" rows="5" cols="40"></textarea><br><br>

    <input type="checkbox" id="subscribe" name="subscribe" value="yes">
    <label for="subscribe">Subscribe to our newsletter</label><br><br>

    <input type="submit" value="Send">
  </form>

  <!-- Footer -->
  <footer>

  </footer>
